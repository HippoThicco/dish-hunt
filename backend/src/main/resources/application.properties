spring.application.name=dish-hunt-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dishhuntdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Dsr50an94.}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
